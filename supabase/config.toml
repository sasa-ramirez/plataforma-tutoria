# Configuración del proyecto Supabase local (CLI).
# Doc: https://supabase.com/docs/guides/local-development
project_id = "plataforma-tutoria"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# En desarrollo, no exigir confirmación por correo para iterar rápido.
enable_confirmations = false

[functions.ai-review]
verify_jwt = true
